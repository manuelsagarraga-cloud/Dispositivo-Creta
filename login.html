<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creta — Ingresar</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">Creta</div>
    <div class="login-sub">Sistema de gestión del emprendimiento</div>

    <div class="login-card">
      <div id="error-login" class="error-msg"></div>

      <div class="campo">
        <label>Email</label>
        <input type="email" id="input-email" placeholder="tu@email.com" autocomplete="email">
      </div>

      <div class="campo">
        <label>Contraseña</label>
        <input type="password" id="input-pass" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="btn btn-primary" id="btn-login">Ingresar</button>
    </div>
  </div>

  <script type="module">
    import { login, getUsuarioActual } from './js/auth.js'

    const user = await getUsuarioActual()
    if (user) window.location.href = 'index.html'

    const errEl = document.getElementById('error-login')
    const btn = document.getElementById('btn-login')

    async function intentarLogin() {
      const email = document.getElementById('input-email').value.trim()
      const pass = document.getElementById('input-pass').value
      errEl.classList.remove('visible')

      if (!email || !pass) {
        errEl.textContent = 'Completá email y contraseña.'
        errEl.classList.add('visible')
        return
      }

      btn.textContent = 'Ingresando...'
      btn.disabled = true

      try {
        await login(email, pass)
        window.location.href = 'index.html'
      } catch (e) {
        errEl.textContent = 'Email o contraseña incorrectos.'
        errEl.classList.add('visible')
        btn.textContent = 'Ingresar'
        btn.disabled = false
      }
    }

    btn.addEventListener('click', intentarLogin)
    document.getElementById('input-pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') intentarLogin()
    })
  </script>
</body>
</html>
