<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creta</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="app-shell">

    <header class="topbar">
      <div class="topbar-logo">Creta</div>
      <div class="topbar-user">
        <span id="topbar-nombre" style="font-size:13px;color:var(--texto-suave)"></span>
        <div class="avatar" id="avatar-iniciales"></div>
        <button id="btn-logout" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--texto-suave)">Salir</button>
      </div>
    </header>

    <main class="main-content" id="contenido">
      <div class="loading">Cargando...</div>
    </main>

    <button class="fab" id="fab" aria-label="Agregar">+</button>

    <nav class="bottom-nav">
      <button class="nav-item active" data-vista="caja">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
        Caja
      </button>
      <button class="nav-item" data-vista="inventario">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Inventario
      </button>
      <button class="nav-item" data-vista="balance">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 1 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/></svg>
        Balance
      </button>
    </nav>

  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-cuerpo"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
